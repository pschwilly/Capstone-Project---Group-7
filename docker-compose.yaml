version: "3.8"

services:
  # =======================
  # UPFs (one per slice)
  # =======================
  free5gc-upf-slice1:
    container_name: upf-slice1
    image: free5gc/upf:v4.1.0
    command: bash -c "./upf-iptables.sh && ./upf -c ./config/upfcfg.yaml"
    volumes:
      - ./config/upfcfg-slice1.yaml:/free5gc/config/upfcfg.yaml
      - ./config/upf-iptables.sh:/free5gc/upf-iptables.sh
    cap_add:
      - NET_ADMIN
    sysctls:
      net.ipv4.conf.all.rp_filter: "0"
      net.ipv4.conf.default.rp_filter: "0"
      net.ipv4.conf.eth0.rp_filter: "0"
    networks:
      privnet:
        aliases:
          - upf-slice1
      handoff_s1:
        ipv4_address: 172.31.1.3

  free5gc-upf-slice2:
    container_name: upf-slice2
    image: free5gc/upf:v4.1.0
    command: bash -c "./upf-iptables.sh && ./upf -c ./config/upfcfg.yaml"
    volumes:
      - ./config/upfcfg-slice2.yaml:/free5gc/config/upfcfg.yaml
      - ./config/upf-iptables.sh:/free5gc/upf-iptables.sh
    cap_add:
      - NET_ADMIN
    sysctls:
      net.ipv4.conf.all.rp_filter: "0"
      net.ipv4.conf.default.rp_filter: "0"
      net.ipv4.conf.eth0.rp_filter: "0"
    networks:
      privnet:
        aliases:
          - upf-slice2
      handoff_s2:
        ipv4_address: 172.31.2.3

  # =======================
  # Database
  # =======================
  db:
    container_name: mongodb
    image: mongo:4.4
    command: mongod --port 27017
    volumes:
      - dbdata:/data/db
    networks:
      privnet:
        aliases:
          - db

  # =======================
  # NRF
  # =======================
  free5gc-nrf:
    container_name: nrf
    image: free5gc/nrf:v4.1.0
    command: ./nrf -c ./config/nrfcfg.yaml
    volumes:
      - ./config/nrfcfg.yaml:/free5gc/config/nrfcfg.yaml
      - ./cert:/free5gc/cert
    environment:
      DB_URI: mongodb://db/free5gc
      GIN_MODE: release
    networks:
      privnet:
        aliases:
          - nrf.free5gc.org
    depends_on:
      - db

  # =======================
  # AMF
  # =======================
  free5gc-amf:
    container_name: amf
    image: free5gc/amf:v4.1.0
    command: ./amf -c ./config/amfcfg.yaml
    volumes:
      - ./config/amfcfg.yaml:/free5gc/config/amfcfg.yaml
      - ./cert:/free5gc/cert
    environment:
      GIN_MODE: release
    networks:
      privnet:
        ipv4_address: 10.100.200.16
        aliases:
          - amf.free5gc.org
    depends_on:
      - free5gc-nrf

  free5gc-ausf:
    container_name: ausf
    image: free5gc/ausf:v4.1.0
    command: ./ausf -c ./config/ausfcfg.yaml
    volumes:
      - ./config/ausfcfg.yaml:/free5gc/config/ausfcfg.yaml
      - ./cert:/free5gc/cert
    environment:
      GIN_MODE: release
    networks:
      privnet:
        aliases:
          - ausf.free5gc.org
    depends_on:
      - free5gc-nrf

  free5gc-nssf:
    container_name: nssf
    image: free5gc/nssf:v4.1.0
    command: ./nssf -c ./config/nssfcfg.yaml
    volumes:
      - ./config/nssfcfg.yaml:/free5gc/config/nssfcfg.yaml
      - ./cert:/free5gc/cert
    environment:
      GIN_MODE: release
    networks:
      privnet:
        aliases:
          - nssf.free5gc.org
    depends_on:
      - free5gc-nrf

  free5gc-pcf:
    container_name: pcf
    image: free5gc/pcf:v4.1.0
    command: ./pcf -c ./config/pcfcfg.yaml
    volumes:
      - ./config/pcfcfg.yaml:/free5gc/config/pcfcfg.yaml
      - ./cert:/free5gc/cert
    environment:
      GIN_MODE: release
    networks:
      privnet:
        aliases:
          - pcf.free5gc.org
    depends_on:
      - free5gc-nrf

  # =======================
  # SMFs
  # =======================
  free5gc-smf-slice1:
    container_name: smf-slice1
    image: free5gc/smf:v4.1.0
    command: ./smf -c ./config/smfcfg.yaml -u ./config/uerouting.yaml
    volumes:
      - ./config/smfcfg-slice1.yaml:/free5gc/config/smfcfg.yaml
      - ./config/uerouting.yaml:/free5gc/config/uerouting.yaml
      - ./cert:/free5gc/cert
    environment:
      GIN_MODE: release
    networks:
      privnet:
        aliases:
          - smf-slice1.free5gc.org
    depends_on:
      - free5gc-nrf
      - free5gc-upf-slice1

  free5gc-smf-slice2:
    container_name: smf-slice2
    image: free5gc/smf:v4.1.0
    command: ./smf -c ./config/smfcfg.yaml -u ./config/uerouting.yaml
    volumes:
      - ./config/smfcfg-slice2.yaml:/free5gc/config/smfcfg.yaml
      - ./config/uerouting.yaml:/free5gc/config/uerouting.yaml
      - ./cert:/free5gc/cert
    environment:
      GIN_MODE: release
    networks:
      privnet:
        aliases:
          - smf-slice2.free5gc.org
    depends_on:
      - free5gc-nrf
      - free5gc-upf-slice2

  # =======================
  # UDM / UDR / CHF / NEF
  # =======================
  free5gc-udm:
    container_name: udm
    image: free5gc/udm:v4.1.0
    command: ./udm -c ./config/udmcfg.yaml
    volumes:
      - ./config/udmcfg.yaml:/free5gc/config/udmcfg.yaml
      - ./cert:/free5gc/cert
    environment:
      GIN_MODE: release
    networks:
      privnet:
        aliases:
          - udm.free5gc.org
    depends_on:
      - db
      - free5gc-nrf

  free5gc-udr:
    container_name: udr
    image: free5gc/udr:v4.1.0
    command: ./udr -c ./config/udrcfg.yaml
    volumes:
      - ./config/udrcfg.yaml:/free5gc/config/udrcfg.yaml
      - ./cert:/free5gc/cert
    environment:
      DB_URI: mongodb://db/free5gc
      GIN_MODE: release
    networks:
      privnet:
        aliases:
          - udr.free5gc.org
    depends_on:
      - db
      - free5gc-nrf

  free5gc-chf:
    container_name: chf
    image: free5gc/chf:v4.1.0
    command: ./chf -c ./config/chfcfg.yaml
    volumes:
      - ./config/chfcfg.yaml:/free5gc/config/chfcfg.yaml
      - ./cert:/free5gc/cert
    environment:
      DB_URI: mongodb://db/free5gc
      GIN_MODE: release
    networks:
      privnet:
        aliases:
          - chf.free5gc.org
    depends_on:
      - db
      - free5gc-nrf

  free5gc-nef:
    container_name: nef
    image: free5gc/nef:v4.1.0
    command: ./nef -c ./config/nefcfg.yaml
    volumes:
      - ./config/nefcfg.yaml:/free5gc/config/nefcfg.yaml
      - ./cert:/free5gc/cert
    environment:
      GIN_MODE: release
    networks:
      privnet:
        aliases:
          - nef.free5gc.org
    depends_on:
      - db
      - free5gc-nrf

  # =======================
  # WEBUI
  # =======================
  free5gc-webui:
    container_name: webui
    image: free5gc/webui:v4.1.0
    command: ./webui -c ./config/webuicfg.yaml
    volumes:
      - ./config/webuicfg.yaml:/free5gc/config/webuicfg.yaml
    environment:
      GIN_MODE: release
    networks:
      privnet:
        aliases:
          - webui
    ports:
      - "5000:5000"
      - "2121:2121"
      - "2122:2122"
    depends_on:
      - db
      - free5gc-nrf

  # =======================
  # UERANSIM gNB only
  # =======================
  gnb:
    container_name: gnb
    build:
      context: ./ueransim
      dockerfile: Dockerfile
    image: ueransim-iperf3:latest
    command: ./nr-gnb -c ./config/gnbcfg.yaml
    volumes:
      - ./config/gnbcfg.yaml:/ueransim/config/gnbcfg.yaml
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun
    networks:
      privnet:
        aliases:
          - gnb.free5gc.org
    depends_on:
      - free5gc-amf
      - free5gc-upf-slice1
      - free5gc-upf-slice2

  # =======================
  # Slice 2 UEs (shared UPF)
  # =======================
  ue-s2-video:
    container_name: ue-s2-video
    build:
      context: ./ueransim
      dockerfile: Dockerfile
    image: ueransim-iperf3:latest
    command: sh -lc "sleep infinity"
    volumes:
      - ./config/uecfg-s2-video.yaml:/ueransim/config/uecfg.yaml
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun
    networks:
      privnet:
    depends_on:
      - gnb
      - free5gc-amf
      - free5gc-upf-slice2

  ue-s2-load:
    container_name: ue-s2-load
    build:
      context: ./ueransim
      dockerfile: Dockerfile
    image: ueransim-iperf3:latest
    command: sh -lc "sleep infinity"
    volumes:
      - ./config/uecfg-s2-load.yaml:/ueransim/config/uecfg.yaml
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun
    networks:
      privnet:
    depends_on:
      - gnb
      - free5gc-amf
      - free5gc-upf-slice2

  # =======================
  # Slice 1 UEs (separate UPF)
  # =======================
  ue-s1-video:
    container_name: ue-s1-video
    build:
      context: ./ueransim
      dockerfile: Dockerfile
    image: ueransim-iperf3:latest
    command: sh -lc "sleep infinity"
    volumes:
      - ./config/uecfg-s1-video.yaml:/ueransim/config/uecfg.yaml
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun
    networks:
      privnet:
    depends_on:
      - gnb
      - free5gc-amf
      - free5gc-upf-slice1

  ue-s1-load:
    container_name: ue-s1-load
    build:
      context: ./ueransim
      dockerfile: Dockerfile
    image: ueransim-iperf3:latest
    command: sh -lc "sleep infinity"
    volumes:
      - ./config/uecfg-s1-load.yaml:/ueransim/config/uecfg.yaml
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun
    networks:
      privnet:
    depends_on:
      - gnb
      - free5gc-amf
      - free5gc-upf-slice1

networks:
  privnet:
    driver: bridge
    ipam:
      config:
        - subnet: 10.100.200.0/24
    driver_opts:
      com.docker.network.bridge.name: br-free5gc

  handoff_s1:
    name: free5gc-compose_handoff_s1
    driver: bridge
    ipam:
      config:
        - subnet: 172.31.1.0/29

  handoff_s2:
    name: free5gc-compose_handoff_s2
    driver: bridge
    ipam:
      config:
        - subnet: 172.31.2.0/29

volumes:
  dbdata:
