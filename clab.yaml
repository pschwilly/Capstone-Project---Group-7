name: g7-transport

mgmt:
  network: free5gc-compose_privnet

topology:
  nodes:
    r1:
      kind: linux
      image: alpine:latest

    r2-s2:
      kind: linux
      image: alpine:latest

    r2-s1:
      kind: linux
      image: alpine:latest

    svc-s2:
      kind: linux
      image: alpine:latest

    svc-s1:
      kind: linux
      image: alpine:latest

  links:
    - endpoints: ["r1:eth1", "r2-s2:eth1"]
    - endpoints: ["r2-s2:eth2", "svc-s2:eth1"]

    - endpoints: ["r1:eth2", "r2-s1:eth1"]
    - endpoints: ["r2-s1:eth2", "svc-s1:eth1"]
