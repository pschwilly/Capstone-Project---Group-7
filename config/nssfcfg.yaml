info:
  version: 1.0.2
  description: NSSF configuration for final 2-slice capstone demo

configuration:
  nssfName: NSSF
  sbi:
    scheme: http
    registerIPv4: nssf.free5gc.org
    bindingIPv4: nssf.free5gc.org
    port: 8000
    tls:
      pem: cert/nssf.pem
      key: cert/nssf.key

  serviceNameList:
    - nnssf-nsselection
    - nnssf-nssaiavailability

  nrfUri: http://nrf.free5gc.org:8000
  nrfCertPem: cert/nrf.pem

  supportedPlmnList:
    - mcc: 208
      mnc: 93

  supportedNssaiInPlmnList:
    - plmnId:
        mcc: 208
        mnc: 93
      supportedSnssaiList:
        - sst: 1
          sd: 010203
        - sst: 1
          sd: 112233

  nsiList:
    - snssai:
        sst: 1
        sd: 010203
      nsiInformationList:
        - nrfId: http://nrf.free5gc.org:8000/nnrf-nfm/v1/nf-instances
          nsiId: 22
    - snssai:
        sst: 1
        sd: 112233
      nsiInformationList:
        - nrfId: http://nrf.free5gc.org:8000/nnrf-nfm/v1/nf-instances
          nsiId: 23

  amfSetList: []
  amfList: []

  taList:
    - tai:
        plmnId:
          mcc: 208
          mnc: 93
        tac: 000001
      accessType: 3GPP_ACCESS
      supportedSnssaiList:
        - sst: 1
          sd: 010203
        - sst: 1
          sd: 112233

  mappingListFromPlmn: []

  metrics:
    enable: false
    scheme: http
    bindingIPv4: nssf.free5gc.org
    port: 9091
    tls:
      pem: cert/nssf.pem
      key: cert/nssf.key
    namespace: free5gc

logger:
  enable: true
  level: info
  reportCaller: false
